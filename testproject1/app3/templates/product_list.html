<!DOCTYPE html>
<html>
<head>
    <title>Product Management</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* Gradient Navbar */
        .custom-navbar {
            background: linear-gradient(to right, #4e54c8, #8f94fb);
        }

        .nav-link {
            color: white !important;
        }

        .nav-link:hover {
            color: #ffd700 !important;
        }

        .navbar-toggler {
            border: none;
            color: white;
        }

        .dropdown-menu {
            border-radius: 8px;
        }
    </style>
</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg custom-navbar">
  <div class="container">

    <!-- Logo -->
    <a class="navbar-brand fw-bold text-white" href="#">CloudStrats</a>

    <!-- Toggle Button -->
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      ☰
    </button>

    <!-- Menu -->
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto align-items-center">

        <li class="nav-item">
          <a class="nav-link" href="{% url 'home' %}">Home</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="#">About</a>
        </li>

        <!-- Account Dropdown -->
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
            Account
          </a>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item" href="/login/">Login</a></li>
            <li><a class="dropdown-item" href="/register/">Register</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item" href="/logout/">Logout</a></li>
          </ul>
        </li>

      </ul>
    </div>
  </div>
</nav>

<!-- MAIN CONTAINER -->
<div class="container mt-4">

    <!-- Page Header -->
    <div class="text-center p-3 mb-4 bg-danger-subtle rounded">
        <h4 class="fw-bold">Product Management</h4>
    </div>

    <div class="row">

        <!-- LEFT: ADD PRODUCT FORM -->
        <div class="col-md-4">
            <div class="card shadow">
                <div class="card-body">

                    <h5>Add Product</h5>

                    <form method="POST">
                        {% csrf_token %}

                        <div class="mb-2">
                            <label>Name</label>
                            <input type="text" name="name" class="form-control">
                        </div>

                        <div class="mb-2">
                            <label>Price</label>
                            <input type="number" name="price" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label>Category</label>
                            <select name="category" class="form-control">
                                {% for c in categories %}
                                    <option value="{{ c.id }}">{{ c.name }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <button class="btn btn-success w-100">Save</button>

                    </form>

                </div>
            </div>
        </div>

        <!-- RIGHT: PRODUCT LIST -->
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-body">

                    <h5>Product List</h5>

                    <table class="table table-bordered table-hover">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Price</th>
                                <th>Category</th>
                                <th>Action</th>
                            </tr>
                        </thead>

                        <tbody>
                            {% for p in products %}
                            <tr>
                                <td>{{ p.id }}</td>
                                <td>{{ p.name }}</td>
                                <td>{{ p.price }}</td>
                                <td>{{ p.category.name }}</td>
                                <td>
                                    <a href="{% url 'delete_product' p.id %}" class="btn btn-danger btn-sm">Delete</a>
                                </td>
                            </tr>
                            {% endfor %}
                        </tbody>

                    </table>

                </div>
            </div>
        </div>

    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
