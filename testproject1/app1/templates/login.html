<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #e7a6a6;
        }
        .card {
            max-width: 450px;
            margin: 60px auto;
            padding: 25px;
            border-radius: 10px;
        }
        .btn-custom {
            width: 100%;
            background-color: green;
            color: white;
        }
        .navbar-custom {
            background-color: #5a4fa3;
        }
        .navbar-custom .nav-link,
        .navbar-custom .navbar-brand {
            color: white !important;
        }
    </style>
</head>
<body>

<!-- ✅ Navbar Start -->
<nav class="navbar navbar-expand-lg navbar-custom px-4">
    <a class="navbar-brand fw-bold" href="#">CloudStrats</a>

    <div class="ms-auto">
        <ul class="navbar-nav">
            <li class="nav-item">
                <a class="nav-link" href="/">Home</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="/register/">Register</a>
            </li>
        </ul>
    </div>
</nav>
<!-- ✅ Navbar End -->

<div class="card shadow">
    <h2 class="text-center mb-4">Login</h2>

    <form method="POST">
        {% csrf_token %}

        <label>Email:</label>
        <input type="text" name="username" class="form-control" placeholder="Enter email"><br>

        <label>Password:</label>
        <input type="password" id="password" name="password" class="form-control" placeholder="Enter password"><br>

        <input type="checkbox" onclick="togglePassword()"> Show Password<br><br>

        <button type="submit" class="btn btn-custom">SIGN IN</button>
    </form>

    <p class="text-center mt-3">
        Forgot <a href="#">Username / Password?</a>
    </p>

    <p class="text-center">
        Don't have an account? <a href="/register/">Sign up</a>
    </p>
</div>

<script>
function togglePassword() {
    var x = document.getElementById("password");
    x.type = (x.type === "password") ? "text" : "password";
}
</script>

</body>
</html>
